<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      background: #1c1c1e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      color: #f0f0f0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label {
      font-size: 13px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #48484b;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #5a9fcf;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2 data-i18n="popupTitle">Reframe MTG</h2>
  <div class="toggle-row">
    <label for="toggle" data-i18n="popupToggleLabel">Replace cards</label>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <p class="info" data-i18n="popupInfo">Replaces card images with old border printings via Scryfall. Reload the page after toggling.</p>
  <a href="#" id="settings" style="display:block;margin-top:10px;font-size:12px;color:#5a9fcf;text-decoration:none;" data-i18n="popupSettings">Set Priority Settings</a>
  <p style="margin-top:10px;font-size:10px;color:#666;"><span data-i18n="popupMadeBy">Made by</span> <a href="https://github.com/aleitner" target="_blank" rel="noopener" style="color:#5a9fcf;text-decoration:none;">aleitner</a> · <a href="https://ko-fi.com/piyrus" target="_blank" rel="noopener" style="color:#5a9fcf;text-decoration:none;">&#9749; <span data-i18n="popupSupport">Support</span></a></p>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
