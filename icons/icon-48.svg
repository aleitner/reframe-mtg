<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 200 200">
  <defs>
    <clipPath id="card-clip">
      <rect x="8" y="4" width="184" height="192" rx="16"/>
    </clipPath>
  </defs>
  <g clip-path="url(#card-clip)">
    <!-- Black border fill -->
    <rect x="8" y="4" width="184" height="192" fill="#1a1a1a"/>
    <!-- Brown frame -->
    <rect x="20" y="16" width="160" height="168" fill="#8B7355"/>
    <!-- Red image box background -->
    <rect x="36" y="32" width="128" height="68" fill="#8B1A1A"/>
    <!-- Fire glow behind ring -->
    <circle cx="100" cy="66" r="30" fill="#CC3300" opacity="0.6"/>
    <circle cx="100" cy="66" r="24" fill="#E85500" opacity="0.5"/>
    <!-- Bright white-yellow center glow -->
    <circle cx="100" cy="66" r="16" fill="#FFDD44" opacity="0.4"/>
    <!-- Fiery ring - outer flame -->
    <circle cx="100" cy="66" r="22" fill="none" stroke="#FF6600" stroke-width="6" opacity="0.7"/>
    <!-- Fiery ring - main gold -->
    <circle cx="100" cy="66" r="20" fill="none" stroke="#D4A843" stroke-width="4"/>
    <!-- Fiery ring - inner bright highlight -->
    <circle cx="100" cy="66" r="18" fill="none" stroke="#FFEE88" stroke-width="1.5" opacity="0.6"/>
    <!-- Lighter text box -->
    <rect x="36" y="116" width="128" height="54" fill="#B5AE9E"/>
    <!-- Text lines -->
    <line x1="48" y1="132" x2="140" y2="132" stroke="#8A8474" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="143" x2="130" y2="143" stroke="#8A8474" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="154" x2="118" y2="154" stroke="#8A8474" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
